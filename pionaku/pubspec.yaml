name: piona_mobile
description: PIONA Mobile - Scanner boarding pass penumpang bandara (gate staff).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  flutter_zxing: ^2.2.1
  google_mlkit_text_recognition: ^0.15.0
  http: ^1.5.0
  image: ^4.3.0
  mobile_scanner: ^6.0.2
  permission_handler: ^11.3.1
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_secure_storage: ^10.0.0
  package_info_plus: ^8.1.2
  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false          # atau true kalau mau sekalian iOS
  image_path: "assets/logo.png"
  adaptive_icon_foreground: "assets/logo.png"
  adaptive_icon_background: "#00000000"
