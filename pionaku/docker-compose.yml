services:
  postgres:
    image: postgres:16
    container_name: pionaku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: piona
      POSTGRES_USER: piona
      POSTGRES_PASSWORD: piona_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pionaku_postgres_data:/var/lib/postgresql/data

volumes:
  pionaku_postgres_data:

